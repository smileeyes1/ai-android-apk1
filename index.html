<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير المرافق للمعلم الفلسطيني</title>
<meta name="theme-color" content="#1b5e20">

<style>
body {
  font-family: Arial, sans-serif;
  direction: rtl;
  background: #f1f5f2;
  margin: 0;
  padding: 15px;
}
h1 {
  text-align: center;
  color: #1b5e20;
}
.section {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}
label {
  font-weight: bold;
}
select, textarea, input, button {
  width: 100%;
  margin-top: 6px;
  margin-bottom: 10px;
  padding: 10px;
  font-size: 16px;
}
button {
  background: #1b5e20;
  color: white;
  border: none;
  border-radius: 8px;
}
.output {
  white-space: pre-wrap;
  line-height: 1.6;
}
small {
  color: #555;
}
</style>
</head>

<body>

<h1>📘 الخبير المرافق للمعلم الفلسطيني</h1>

<div class="section">
<label>الصف:</label>
<select id="grade">
  <option>الأول</option>
  <option>الثاني</option>
</select>

<label>المادة:</label>
<select id="subject">
  <option>رياضيات</option>
</select>

<label>عنوان الدرس:</label>
<input id="lessonTitle" placeholder="مثال: الطرح ضمن 10">

<label>📸 صورة الدرس (للتذكير فقط – لا تُقرأ تلقائيًا):</label>
<input type="file" accept="image/*">

<small>
تُستخدم الصورة لتأكيد الدرس بصريًا فقط.
يتم بناء التحضير بناءً على المفهوم التربوي لا النص الحرفي.
</small>

<label>🧠 اختر مفهوم الدرس:</label>
<select id="concept">
  <option>أخذ من مجموعة (طرح)</option>
  <option>ضم مجموعتين (جمع)</option>
  <option>مقارنة عددين</option>
  <option>ترتيب تصاعدي / تنازلي</option>
  <option>عدد سابق / لاحق</option>
  <option>قيمة منزلية</option>
</select>

<button onclick="generatePlan()">إنشاء تحضير ومحاكاة صفية</button>
</div>

<div class="section">
<h3>🧩 التحضير والمحاكاة المقترحة</h3>
<div id="output" class="output"></div>
</div>

<div class="section">
<h3>📝 ملاحظات المعلم</h3>
<textarea id="notes" placeholder="اكتب ماذا حدث في الحصة..."></textarea>
<button onclick="saveNotes()">حفظ الملاحظات</button>
</div>

<script>
function generatePlan() {
  const grade = gradeEl.value;
  const subject = subjectEl.value;
  const title = lessonTitle.value;
  const concept = conceptEl.value;

  const text = `
الصف: ${grade}
المادة: ${subject}
الدرس: ${title}
المفهوم: ${concept}

🎯 الهدف السلوكي:
أن يفهم الطالب مفهوم "${concept}" ويطبقه في مواقف حياتية بسيطة.

🌱 التمهيد:
موقف من واقع الطالب الفلسطيني (في البيت أو الصف).

📘 خطوات الشرح:
1. طرح سؤال شفهي مرتبط بحياة الطالب.
2. تمثيل المفهوم بالمحسوسات (أصابع – أقلام).
3. مشاركة جماعية سريعة.

🎲 نشاط صفّي:
نشاط حركي بسيط لا يحتاج وسائل، مناسب لصف مكتظ.

✅ التقويم:
سؤال شفهي + تطبيق واحد أمام السبورة.

🏠 الواجب:
مهمة خفيفة من البيت مرتبطة بالمفهوم.
`;

  output.textContent = text;
}

function saveNotes() {
  localStorage.setItem("teacher_notes", notes.value);
  alert("✅ تم حفظ الملاحظات محليًا");
}

notes.value = localStorage.getItem("teacher_notes") || "";

// PWA
const manifest = {
  name: "الخبير المرافق للمعلم الفلسطيني",
  short_name: "الخبير المرافق",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#1b5e20"
};

const manifestBlob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
const manifestURL = URL.createObjectURL(manifestBlob);
const link = document.createElement("link");
link.rel = "manifest";
link.href = manifestURL;
document.head.appendChild(link);

if ("serviceWorker" in navigator) {
  const swCode = `
self.addEventListener("install", e => {
  e.waitUntil(
    caches.open("teacher-cache").then(c => c.addAll(["./"]))
  );
});
self.addEventListener("fetch", e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});
`;
  const swBlob = new Blob([swCode], {type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob));
}

const gradeEl = document.getElementById("grade");
const subjectEl = document.getElementById("subject");
const lessonTitle = document.getElementById("lessonTitle");
const output = document.getElementById("output");
const notes = document.getElementById("notes");
</script>

</body>
</html>
