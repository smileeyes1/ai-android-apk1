<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير المرافق للمعلم الفلسطيني</title>
<meta name="theme-color" content="#1b5e20">

<style>
body {
  font-family: Arial, sans-serif;
  direction: rtl;
  background: #f1f5f2;
  margin: 0;
  padding: 15px;
}
h1 {
  text-align: center;
  color: #1b5e20;
}
.section {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}
label {
  font-weight: bold;
}
select, textarea, input, button {
  width: 100%;
  margin-top: 5px;
  margin-bottom: 10px;
  padding: 10px;
  font-size: 16px;
}
button {
  background: #1b5e20;
  color: white;
  border: none;
  border-radius: 8px;
}
output {
  white-space: pre-wrap;
  font-size: 15px;
  line-height: 1.6;
}
</style>
</head>

<body>

<h1>📘 الخبير المرافق للمعلم الفلسطيني</h1>

<div class="section">
<label>الصف:</label>
<select id="grade">
<option>الأول</option>
<option>الثاني</option>
</select>

<label>المادة:</label>
<select id="subject">
<option>رياضيات</option>
<option>لغة عربية</option>
</select>

<label>عنوان الدرس:</label>
<input id="lessonTitle" placeholder="مثال: الطرح ضمن 10">

<label>نص من الكتاب (اختياري):</label>
<textarea id="bookText" placeholder="ألصق نص الدرس من الكتاب هنا"></textarea>

<button onclick="generatePlan()">إنشاء تحضير وخطة</button>
</div>

<div class="section">
<h3>📋 التحضير المقترح</h3>
<output id="plan"></output>
</div>

<div class="section">
<h3>📝 ملاحظات المعلم</h3>
<textarea id="notes"></textarea>
<button onclick="saveNotes()">حفظ الملاحظات</button>
</div>

<script>
function generatePlan() {
  const grade = document.getElementById("grade").value;
  const subject = document.getElementById("subject").value;
  const title = document.getElementById("lessonTitle").value;
  const text = document.getElementById("bookText").value;

  const plan = `
الصف: ${grade}
المادة: ${subject}
الدرس: ${title}

🎯 الهدف:
أن يتعرف الطالب على مفهوم ${title} ويطبقه في حياته اليومية.

🌱 التمهيد:
موقف من واقع الطفل الفلسطيني (الصف، البيت، الشارع).

📚 خطوات الشرح:
1. مناقشة شفهية باستخدام أسئلة بسيطة.
2. تمثيل بالمحسوسات (أصابع، أقلام، حجارة).
3. مشاركة جماعية.

🎲 نشاط صفّي:
نشاط حركي لا يحتاج وسائل، مناسب لصف مكتظ.

✅ التقويم:
سؤال شفوي + مثال تطبيقي سريع.

🏠 الواجب:
مهمة خفيفة من واقع حياة الطالب.

📖 ملاحظات من نص الكتاب:
${text ? text.substring(0,300) + "..." : "لم يتم إدخال نص"}
`;

  document.getElementById("plan").textContent = plan;
}

function saveNotes() {
  localStorage.setItem("teacher_notes", document.getElementById("notes").value);
  alert("✅ تم حفظ الملاحظات");
}

document.getElementById("notes").value =
  localStorage.getItem("teacher_notes") || "";

// ===== PWA جزء داخلي =====
const manifest = {
  name: "الخبير المرافق للمعلم الفلسطيني",
  short_name: "الخبير المرافق",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#1b5e20"
};

const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement("link");
link.rel = "manifest";
link.href = manifestURL;
document.head.appendChild(link);

if ("serviceWorker" in navigator) {
  const swCode = `
    self.addEventListener("install", e => {
      e.waitUntil(
        caches.open("teacher-cache").then(c =>
          c.addAll(["./"])
        )
      );
    });
    self.addEventListener("fetch", e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: "application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob));
}
</script>

</body>
</html>
